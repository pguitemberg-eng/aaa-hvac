<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HVAC Client Onboarding</title>
  <style>
    :root {
      --bg: #07111f;
      --panel: #0d1b2d;
      --panel-border: #1a2c46;
      --text: #e8eef7;
      --muted: #9db0ca;
      --input-bg: #0a1628;
      --input-border: #2a3f5f;
      --accent: #3da0ff;
      --accent-hover: #2a8de8;
      --success-bg: #0f2f1e;
      --success-border: #1f8d4e;
      --danger-bg: #3a1521;
      --danger-border: #b03a5b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 14px;
    }

    .container {
      width: 100%;
      max-width: 760px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.45rem;
      line-height: 1.25;
    }

    .subtitle {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    form {
      display: grid;
      gap: 14px;
    }

    .grid {
      display: grid;
      gap: 12px;
      grid-template-columns: 1fr;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 0.88rem;
      color: var(--muted);
    }

    input,
    select {
      width: 100%;
      padding: 11px 12px;
      border-radius: 10px;
      border: 1px solid var(--input-border);
      background: var(--input-bg);
      color: var(--text);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease;
    }

    input:focus,
    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(61, 160, 255, 0.22);
    }

    button[type="submit"] {
      margin-top: 4px;
      padding: 12px 16px;
      border-radius: 10px;
      border: 0;
      background: var(--accent);
      color: #001328;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.18s ease, transform 0.08s ease;
    }

    button[type="submit"]:hover {
      background: var(--accent-hover);
    }

    button[type="submit"]:active {
      transform: translateY(1px);
    }

    button[disabled] {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .message {
      display: none;
      margin-top: 14px;
      padding: 12px 13px;
      border-radius: 10px;
      border: 1px solid transparent;
      font-size: 0.92rem;
    }

    .message.success {
      display: block;
      background: var(--success-bg);
      border-color: var(--success-border);
      color: #bdeecf;
    }

    .message.error {
      display: block;
      background: var(--danger-bg);
      border-color: var(--danger-border);
      color: #ffd0de;
    }

    @media (min-width: 640px) {
      .container {
        padding: 24px;
      }

      .grid.two-col {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>HVAC Client Onboarding</h1>
    <p class="subtitle">Complete this form to get your account set up and plan activated.</p>

    <form id="onboardingForm">
      <div class="grid two-col">
        <div class="field">
          <label for="firstName">First Name</label>
          <input id="firstName" name="first_name" type="text" required autocomplete="given-name">
        </div>
        <div class="field">
          <label for="lastName">Last Name</label>
          <input id="lastName" name="last_name" type="text" required autocomplete="family-name">
        </div>
      </div>

      <div class="grid two-col">
        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" required autocomplete="email">
        </div>
        <div class="field">
          <label for="phone">Phone</label>
          <input id="phone" name="phone" type="tel" required autocomplete="tel">
        </div>
      </div>

      <div class="grid two-col">
        <div class="field">
          <label for="companyName">Company Name</label>
          <input id="companyName" name="company_name" type="text" required autocomplete="organization">
        </div>
        <div class="field">
          <label for="businessPhone">Business Phone</label>
          <input id="businessPhone" name="business_phone" type="tel" required>
        </div>
      </div>

      <div class="grid two-col">
        <div class="field">
          <label for="serviceArea">Service Area</label>
          <select id="serviceArea" name="service_area" required>
            <option value="" disabled selected>Select area</option>
            <option value="NY">NY</option>
            <option value="LI">LI</option>
          </select>
        </div>
        <div class="field">
          <label for="plan">Plan Selection</label>
          <select id="plan" name="plan" required>
            <option value="" disabled selected>Select plan</option>
            <option value="Starter">$497 - Starter</option>
            <option value="Pro">$997 - Pro</option>
            <option value="Elite">$1497 - Elite</option>
          </select>
        </div>
      </div>

      <button id="submitBtn" type="submit">Submit Onboarding</button>
    </form>

    <div id="message" class="message" role="status" aria-live="polite"></div>
  </main>

  <script>
    const form = document.getElementById("onboardingForm");
    const message = document.getElementById("message");
    const submitBtn = document.getElementById("submitBtn");

    function showMessage(type, text) {
      message.className = `message ${type}`;
      message.textContent = text;
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      message.className = "message";
      message.textContent = "";

      const formData = new FormData(form);
      const payload = {
        first_name: formData.get("first_name"),
        last_name: formData.get("last_name"),
        email: formData.get("email"),
        phone: formData.get("phone"),
        company_name: formData.get("company_name"),
        business_phone: formData.get("business_phone"),
        service_area: formData.get("service_area"),
        plan: formData.get("plan")
      };

      submitBtn.disabled = true;
      submitBtn.textContent = "Submitting...";

      try {
        const response = await fetch("/onboarding/submit", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        if (!response.ok) {
          throw new Error(`Request failed with status ${response.status}`);
        }

        form.reset();
        showMessage("success", "Thanks! Your onboarding form was submitted successfully.");
      } catch (error) {
        showMessage("error", "Could not submit your onboarding form. Please try again.");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Submit Onboarding";
      }
    });
  </script>
</body>
</html>
